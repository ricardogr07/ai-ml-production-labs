[tox]
env_list = py312, lint, type, security, audit
requires =
    tox>=4.25
    tox-uv>=1.25

[testenv]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    pytest {posargs}

[testenv:py312]
runner = uv-venv-lock-runner
dependency_groups = dev
uv_sync_flags = --all-packages
commands =
    pytest --cov --cov-report=term-missing {posargs}

[testenv:lint]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff check .
    ruff format --check .

[testenv:format]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff check . --fix
    ruff format .

[testenv:type]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    pyrefly check shared/src

[testenv:security]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    bandit -c pyproject.toml -r shared/src labs

[testenv:audit]
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    pip-audit
