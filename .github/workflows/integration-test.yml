name: Integration Test

on:
  workflow_dispatch:
    inputs:
      lab:
        description: Lab to test
        type: choice
        options:
          - 01-fastapi-azure-ml-service
          - 02-azure-functions-text-classifier
          - 03-fastmcp-portfolio-tools
          - 04-cosmosdb-llm-eval-store
          - 05-ollama-local-llm-api
          - 06-cosmosdb-vector-memory-lab
          - 08-langgraph-project-agent
          - 09-llamaindex-doc-qa-lab
        default: 01-fastapi-azure-ml-service
      image_name:
        description: "Image name on GHCR (labs 01/05/08/09, e.g. fastapi-azure-ml-service, ollama-local-llm-api, langgraph-project-agent or llamaindex-doc-qa-lab)"
        type: string
        default: fastapi-azure-ml-service
      acr_name:
        description: "ACR registry name (lab 03 only)"
        type: string
        default: acraimlprodlabsdev
      hold_for_validation:
        description: Pause before teardown for manual testing
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  provision-acr:
    name: Provision ACR (lab 03)
    if: startsWith(inputs.lab, '03-')
    runs-on: ubuntu-latest
    env:
      TF_VAR_resource_group_name: ${{ secrets.AZURE_RESOURCE_GROUP }}
      TF_VAR_acr_name: ${{ inputs.acr_name }}
      TF_VAR_mcp_auth_token: ${{ secrets.MCP_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: terraform init

      - name: Provision ACR and identity
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: |
          RG="${TF_VAR_resource_group_name}"
          ACR="${TF_VAR_acr_name}"

          # Import orphaned resources so apply is idempotent across reruns
          if ! terraform state show azurerm_container_registry.this > /dev/null 2>&1; then
            ACR_ID=$(az acr show --name "$ACR" --resource-group "$RG" --query id -o tsv 2>/dev/null || true)
            [ -n "$ACR_ID" ] && terraform import azurerm_container_registry.this "$ACR_ID"
          fi

          SUB=$(az account show --query id -o tsv)

          if ! terraform state show azurerm_user_assigned_identity.acr_pull > /dev/null 2>&1; then
            MI_EXISTS=$(az identity show --name "mi-fastmcp-portfolio-tools-dev" --resource-group "$RG" --query name -o tsv 2>/dev/null || true)
            if [ -n "$MI_EXISTS" ]; then
              terraform import azurerm_user_assigned_identity.acr_pull \
                "/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/mi-fastmcp-portfolio-tools-dev"
            fi
          fi

          if ! terraform state show azurerm_role_assignment.acr_pull > /dev/null 2>&1; then
            ACR_SCOPE="/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ContainerRegistry/registries/$ACR"
            MI_PRINCIPAL=$(az identity show --name "mi-fastmcp-portfolio-tools-dev" --resource-group "$RG" --query principalId -o tsv 2>/dev/null || true)
            if [ -n "$MI_PRINCIPAL" ]; then
              RA_ID=$(az role assignment list --scope "$ACR_SCOPE" --role "AcrPull" --assignee "$MI_PRINCIPAL" --query "[0].id" -o tsv 2>/dev/null || true)
              [ -n "$RA_ID" ] && terraform import azurerm_role_assignment.acr_pull "$RA_ID"
            fi
          fi

          terraform apply -auto-approve \
            -target=azurerm_container_registry.this \
            -target=azurerm_user_assigned_identity.acr_pull \
            -target=azurerm_role_assignment.acr_pull \
            -target=time_sleep.wait_for_role

      - name: Upload ACR Terraform state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfstate-acr-${{ inputs.lab }}
          path: labs/${{ inputs.lab }}/infra/terraform.tfstate
          retention-days: 1

  build:
    name: Build and push image
    needs: [provision-acr]
    if: |
      always() &&
      !startsWith(inputs.lab, '02-') &&
      !startsWith(inputs.lab, '04-') &&
      !startsWith(inputs.lab, '06-') &&
      (needs.provision-acr.result == 'success' || needs.provision-acr.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build-ghcr.outputs.image_tag || steps.build-acr.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (lab 03 ACR push)
        if: startsWith(inputs.lab, '03-')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to GHCR
        id: build-ghcr
        if: "!startsWith(inputs.lab, '03-')"
        uses: ./.github/actions/build-and-push
        with:
          lab: ${{ inputs.lab }}
          image_name: ${{ inputs.image_name }}
          ghcr_username: ${{ github.repository_owner }}
          ghcr_pat: ${{ secrets.GHCR_PAT }}

      - name: Build and push to ACR
        id: build-acr
        if: startsWith(inputs.lab, '03-')
        uses: ./.github/actions/build-and-push-acr
        with:
          lab: ${{ inputs.lab }}
          image_name: fastmcp-portfolio-tools
          acr_name: ${{ inputs.acr_name }}

  deploy:
    name: Terraform apply
    needs: [provision-acr, build]
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.provision-acr.result == 'success' || needs.provision-acr.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      fqdn: ${{ steps.apply.outputs.fqdn }}
      function_app_name: ${{ steps.fn_name.outputs.function_app_name }}
      cosmos_endpoint: ${{ steps.cosmos.outputs.endpoint }}
      agent_container_group: ${{ steps.agent_cg.outputs.agent_container_group }}
      ollama_fqdn: ${{ steps.lab09_outputs.outputs.ollama_fqdn }}
      qdrant_fqdn: ${{ steps.lab09_outputs.outputs.qdrant_fqdn }}
    env:
      TF_VAR_container_image: ${{ needs.build.outputs.image_tag }}
      TF_VAR_ghcr_username: ${{ github.repository_owner }}
      TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
      TF_VAR_resource_group_name: ${{ secrets.AZURE_RESOURCE_GROUP }}
      TF_VAR_acr_name: ${{ inputs.acr_name }}
      TF_VAR_mcp_auth_token: ${{ secrets.MCP_AUTH_TOKEN }}
      TF_VAR_ollama_base_url: "http://placeholder:11434"
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      # Lab 09 only (ignored by other labs' configs): authenticated Docker Hub
      # pulls for the ACI images. The Qdrant key is generated per run below, not
      # a stored secret, so a leaked run's key dies with its torn-down Qdrant.
      TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
      # The lab's documented default is llama3.2 (3B), but that overruns the 8GB
      # Ollama ACI at model load; the deploy test uses the 1B variant, which fits
      # and still exercises the full retrieve-and-generate loop.
      TF_VAR_ollama_model: llama3.2:1b
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (labs 01/05/09 orphan check)
        if: startsWith(inputs.lab, '01-') || startsWith(inputs.lab, '05-') || startsWith(inputs.lab, '09-')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy always starts from empty local state, so an app left behind by a
      # wedged teardown (deletes on this CAE can take 40+ minutes) would 409 the
      # apply. Delete any orphan first; usually a no-op.
      - name: Delete orphaned container app (labs 01/05/09)
        if: startsWith(inputs.lab, '01-') || startsWith(inputs.lab, '05-') || startsWith(inputs.lab, '09-')
        shell: bash
        env:
          RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          case "${{ inputs.lab }}" in
            01-*) CA_NAME="ca-fastapi-azure-ml-service-dev" ;;
            05-*) CA_NAME="ca-ollama-local-llm-api-dev" ;;
            09-*) CA_NAME="ca-llamaindex-doc-qa-lab-dev" ;;
          esac
          CA_EXISTS=$(az containerapp show --name "$CA_NAME" --resource-group "$RG" --query name -o tsv 2>/dev/null || true)
          if [ -n "$CA_EXISTS" ]; then
            echo "Deleting orphaned container app ${CA_NAME}..."
            az containerapp delete --name "$CA_NAME" --resource-group "$RG" --yes
          fi

      - name: Download ACR Terraform state (lab 03)
        if: startsWith(inputs.lab, '03-')
        uses: actions/download-artifact@v4
        with:
          name: tfstate-acr-${{ inputs.lab }}
          path: labs/${{ inputs.lab }}/infra/

      - name: Azure login (lab 03 import)
        if: startsWith(inputs.lab, '03-')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init (lab 03 import)
        if: startsWith(inputs.lab, '03-')
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: terraform init

      - name: Delete orphaned container app (lab 03)
        if: startsWith(inputs.lab, '03-')
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: |
          RG="${TF_VAR_resource_group_name}"
          CA_NAME="ca-fastmcp-portfolio-tools-dev"
          # If the container app exists outside Terraform state (orphaned from a prior failed run),
          # delete it so Terraform creates it fresh with the correct UserAssigned identity.
          # Importing and updating a SystemAssigned->UserAssigned transition causes ACA to pull
          # the image with the old identity, which has no AcrPull and times out after 20 minutes.
          if ! terraform state show azurerm_container_app.this > /dev/null 2>&1; then
            CA_EXISTS=$(az containerapp show --name "$CA_NAME" --resource-group "$RG" --query name -o tsv 2>/dev/null || true)
            if [ -n "$CA_EXISTS" ]; then
              echo "Deleting orphaned container app to allow fresh creation with UserAssigned identity..."
              az containerapp delete --name "$CA_NAME" --resource-group "$RG" --yes
            fi
          fi

      - name: Azure login (lab 04 import)
        if: startsWith(inputs.lab, '04-')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init (lab 04 import)
        if: startsWith(inputs.lab, '04-')
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: terraform init

      - name: Import orphaned CosmosDB resources (lab 04)
        if: startsWith(inputs.lab, '04-')
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: |
          RG="${TF_VAR_resource_group_name}"
          ACCT="cosmos-llm-eval-store-dev"
          DB="llm-eval-store"
          CONTAINER="evaluations"

          PROV=$(az cosmosdb show --name "$ACCT" --resource-group "$RG" --query provisioningState -o tsv 2>/dev/null || true)

          if [ "$PROV" = "Succeeded" ]; then
            echo "Account is active, importing orphaned resources..."

            if ! terraform state show azurerm_cosmosdb_account.this > /dev/null 2>&1; then
              ID=$(az cosmosdb show --name "$ACCT" --resource-group "$RG" --query id -o tsv 2>/dev/null || true)
              [ -n "$ID" ] && terraform import azurerm_cosmosdb_account.this "$ID"
            fi

            if ! terraform state show azurerm_cosmosdb_sql_database.this > /dev/null 2>&1; then
              ID=$(az cosmosdb sql database show --account-name "$ACCT" --name "$DB" --resource-group "$RG" --query id -o tsv 2>/dev/null || true)
              [ -n "$ID" ] && terraform import azurerm_cosmosdb_sql_database.this "$ID"
            fi

            if ! terraform state show azurerm_cosmosdb_sql_container.this > /dev/null 2>&1; then
              ID=$(az cosmosdb sql container show --account-name "$ACCT" --database-name "$DB" --name "$CONTAINER" --resource-group "$RG" --query id -o tsv 2>/dev/null || true)
              [ -n "$ID" ] && terraform import azurerm_cosmosdb_sql_container.this "$ID"
            fi
          elif [ -n "$PROV" ]; then
            echo "Account is in state '$PROV', skipping import"
          else
            echo "Account not found, apply will create it"
          fi

      - name: Azure login (lab 06 import)
        if: startsWith(inputs.lab, '06-')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init (lab 06 import)
        if: startsWith(inputs.lab, '06-')
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: terraform init

      - name: Import orphaned CosmosDB resources (lab 06)
        if: startsWith(inputs.lab, '06-')
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: |
          RG="${TF_VAR_resource_group_name}"
          ACCT="cosmos-vector-memory-dev"
          DB="vector-memory"
          CONTAINER="documents"

          PROV=$(az cosmosdb show --name "$ACCT" --resource-group "$RG" --query provisioningState -o tsv 2>/dev/null || true)

          if [ "$PROV" = "Succeeded" ]; then
            echo "Account is active, importing orphaned resources..."

            if ! terraform state show azurerm_cosmosdb_account.this > /dev/null 2>&1; then
              ID=$(az cosmosdb show --name "$ACCT" --resource-group "$RG" --query id -o tsv 2>/dev/null || true)
              [ -n "$ID" ] && terraform import azurerm_cosmosdb_account.this "$ID"
            fi

            if ! terraform state show azurerm_cosmosdb_sql_database.this > /dev/null 2>&1; then
              ID=$(az cosmosdb sql database show --account-name "$ACCT" --name "$DB" --resource-group "$RG" --query id -o tsv 2>/dev/null || true)
              [ -n "$ID" ] && terraform import azurerm_cosmosdb_sql_database.this "$ID"
            fi

            if ! terraform state show azapi_resource.container > /dev/null 2>&1; then
              ID=$(az cosmosdb sql container show --account-name "$ACCT" --database-name "$DB" --name "$CONTAINER" --resource-group "$RG" --query id -o tsv 2>/dev/null || true)
              [ -n "$ID" ] && terraform import azapi_resource.container "$ID"
            fi
          elif [ -n "$PROV" ]; then
            echo "Account is in state '$PROV', skipping import"
          else
            echo "Account not found, apply will create it"
          fi

      # Per-run Qdrant API key: generated here, consumed by terraform apply
      # (TF_VAR) and the same-job seed step below. Not a stored secret, so a
      # leaked run's key is useless once its Qdrant is torn down. Teardown does
      # not need it (the tf var defaults to empty for destroy).
      - name: Generate per-run Qdrant API key (lab 09)
        id: qdrant_key
        if: startsWith(inputs.lab, '09-')
        shell: bash
        run: |
          KEY=$(openssl rand -hex 32)
          echo "::add-mask::$KEY"
          echo "TF_VAR_qdrant_api_key=$KEY" >> "$GITHUB_ENV"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Apply
        id: apply
        uses: ./.github/actions/terraform-apply
        with:
          working_dir: labs/${{ inputs.lab }}/infra
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture function app name
        id: fn_name
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: |
          NAME=$(terraform output -raw function_app_name 2>/dev/null || echo "")
          echo "function_app_name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Capture agent container group (lab 08)
        if: startsWith(inputs.lab, '08-')
        id: agent_cg
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: |
          NAME=$(terraform output -raw agent_container_group 2>/dev/null || echo "")
          echo "agent_container_group=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Capture Ollama/Qdrant outputs (lab 09)
        if: startsWith(inputs.lab, '09-')
        id: lab09_outputs
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: |
          OLLAMA=$(terraform output -raw ollama_fqdn 2>/dev/null || echo "")
          QDRANT=$(terraform output -raw qdrant_fqdn 2>/dev/null || echo "")
          echo "ollama_fqdn=${OLLAMA}" >> "$GITHUB_OUTPUT"
          echo "qdrant_fqdn=${QDRANT}" >> "$GITHUB_OUTPUT"

      # Seed here, in the deploy job, so the per-run Qdrant key stays a same-job
      # step output (masked secrets passed as cross-job outputs are unreliable).
      - name: Set up uv (lab 09 seed)
        if: startsWith(inputs.lab, '09-')
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (lab 09 seed)
        if: startsWith(inputs.lab, '09-')
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies (lab 09 seed)
        if: startsWith(inputs.lab, '09-')
        run: uv sync --frozen --all-packages

      - name: Wait for Ollama/Qdrant and seed the corpus (lab 09)
        if: startsWith(inputs.lab, '09-')
        env:
          OLLAMA_BASE_URL: http://${{ steps.lab09_outputs.outputs.ollama_fqdn }}:11434
          QDRANT_URL: http://${{ steps.lab09_outputs.outputs.qdrant_fqdn }}:6333
          QDRANT_API_KEY: ${{ steps.qdrant_key.outputs.key }}
          # Fits the 8GB Ollama ACI; matches the app's OLLAMA_MODEL (TF_VAR_ollama_model).
          OLLAMA_MODEL: llama3.2:1b
        run: |
          echo "Waiting for Ollama API at $OLLAMA_BASE_URL ..."
          for i in $(seq 1 30); do
            curl -sf "$OLLAMA_BASE_URL/api/tags" > /dev/null && break
            sleep 10
          done

          echo "Pulling $OLLAMA_MODEL ..."
          curl -sf "$OLLAMA_BASE_URL/api/pull" -d "{\"name\": \"$OLLAMA_MODEL\"}" | tail -1

          # /readyz is exempt from Qdrant's API-key auth, so it needs no key here.
          echo "Waiting for Qdrant at $QDRANT_URL ..."
          for i in $(seq 1 30); do
            curl -sf "$QDRANT_URL/readyz" > /dev/null && break
            sleep 10
          done

          uv run --frozen --package llamaindex-doc-qa-lab python labs/${{ inputs.lab }}/scripts/seed_data.py --recreate

      - name: Capture Cosmos outputs (labs 04/06)
        if: startsWith(inputs.lab, '04-') || startsWith(inputs.lab, '06-')
        id: cosmos
        working-directory: labs/${{ inputs.lab }}/infra
        shell: bash
        run: |
          ENDPOINT=$(terraform output -raw endpoint 2>/dev/null || echo "")
          echo "endpoint=${ENDPOINT}" >> "$GITHUB_OUTPUT"

      - name: Upload Terraform state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfstate-${{ inputs.lab }}
          path: labs/${{ inputs.lab }}/infra/terraform.tfstate
          retention-days: 1

  publish-functions:
    name: Publish function code
    needs: deploy
    if: always() && needs.deploy.result == 'success' && startsWith(inputs.lab, '02-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install workspace dependencies
        run: uv sync --frozen --all-packages

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Assemble deployment package
        run: |
          LAB="labs/${{ inputs.lab }}"
          DEPLOY_DIR="/tmp/func-deploy"
          mkdir -p "$DEPLOY_DIR"
          cp "$LAB/function_app.py" "$DEPLOY_DIR/"
          cp "$LAB/host.json" "$DEPLOY_DIR/"
          cp -r "$LAB/src/azure_functions_text_classifier" "$DEPLOY_DIR/azure_functions_text_classifier"
          cp -r shared/src/production_labs_shared "$DEPLOY_DIR/production_labs_shared"
          uv export --package azure-functions-text-classifier --no-hashes --no-dev \
            | grep -v '^-e' > "$DEPLOY_DIR/requirements.txt"
          uv pip install -r "$DEPLOY_DIR/requirements.txt" \
            --target "$DEPLOY_DIR/.python_packages/lib/site-packages"

      - name: Publish function app
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy.outputs.function_app_name }}
          package: /tmp/func-deploy
          scm-do-build-during-deployment: false
          enable-oryx-build: false

  smoke-test:
    name: Smoke test
    needs: [deploy, publish-functions]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (needs.publish-functions.result == 'success' || needs.publish-functions.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Run HTTP smoke test (labs 01/02/03)
        if: "!startsWith(inputs.lab, '04-') && !startsWith(inputs.lab, '05-') && !startsWith(inputs.lab, '06-') && !startsWith(inputs.lab, '08-') && !startsWith(inputs.lab, '09-')"
        uses: ./.github/actions/run-smoke-test
        with:
          lab: ${{ inputs.lab }}
          base_url: https://${{ needs.deploy.outputs.fqdn }}

      - name: Run HTTP smoke test (lab 05, health only)
        if: startsWith(inputs.lab, '05-')
        uses: ./.github/actions/run-smoke-test
        with:
          lab: ${{ inputs.lab }}
          base_url: https://${{ needs.deploy.outputs.fqdn }}
        env:
          HEALTH_ONLY: "true"

      - name: Set up uv (lab 04)
        if: startsWith(inputs.lab, '04-')
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (lab 04)
        if: startsWith(inputs.lab, '04-')
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies (lab 04)
        if: startsWith(inputs.lab, '04-')
        run: uv sync --frozen --all-packages

      - name: Azure login (lab 04)
        if: startsWith(inputs.lab, '04-')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run integration tests against Azure (lab 04)
        if: startsWith(inputs.lab, '04-')
        env:
          COSMOS_URL: ${{ needs.deploy.outputs.cosmos_endpoint }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          ACCT=$(echo "$COSMOS_URL" | sed 's|https://||;s|\.documents\.azure\.com.*||')
          COSMOS_KEY=$(az cosmosdb keys list --name "$ACCT" --resource-group "$AZURE_RESOURCE_GROUP" --type keys --query primaryMasterKey -o tsv)
          export COSMOS_KEY
          uv run --python 3.12 pytest labs/${{ inputs.lab }} -v -m integration

      - name: Run smoke test against deployed Azure (lab 04)
        if: startsWith(inputs.lab, '04-')
        env:
          COSMOS_URL: ${{ needs.deploy.outputs.cosmos_endpoint }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          ACCT=$(echo "$COSMOS_URL" | sed 's|https://||;s|\.documents\.azure\.com.*||')
          COSMOS_KEY=$(az cosmosdb keys list --name "$ACCT" --resource-group "$AZURE_RESOURCE_GROUP" --type keys --query primaryMasterKey -o tsv)
          export COSMOS_KEY
          uv run python labs/${{ inputs.lab }}/scripts/smoke_test.py --target deployed

      - name: Set up uv (lab 06)
        if: startsWith(inputs.lab, '06-')
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (lab 06)
        if: startsWith(inputs.lab, '06-')
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies (lab 06)
        if: startsWith(inputs.lab, '06-')
        run: uv sync --frozen --all-packages

      - name: Azure login (lab 06)
        if: startsWith(inputs.lab, '06-')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run smoke test against deployed Azure (lab 06)
        if: startsWith(inputs.lab, '06-')
        env:
          COSMOS_URL: ${{ needs.deploy.outputs.cosmos_endpoint }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          ACCT=$(echo "$COSMOS_URL" | sed 's|https://||;s|\.documents\.azure\.com.*||')
          COSMOS_KEY=$(az cosmosdb keys list --name "$ACCT" --resource-group "$AZURE_RESOURCE_GROUP" --type keys --query primaryMasterKey -o tsv)
          export COSMOS_KEY
          uv run python labs/${{ inputs.lab }}/scripts/smoke_test.py --target deployed

      - name: Azure login (lab 08)
        if: startsWith(inputs.lab, '08-')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Assert agent run against Anthropic API (lab 08)
        if: startsWith(inputs.lab, '08-')
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AGENT_CG: ${{ needs.deploy.outputs.agent_container_group }}
        run: |
          echo "Waiting for one-shot agent container to terminate..."
          for i in $(seq 1 60); do
            STATE=$(az container show --name "$AGENT_CG" --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "containers[0].instanceView.currentState.state" -o tsv 2>/dev/null || echo "")
            echo "state: ${STATE:-unknown}"
            [ "$STATE" = "Terminated" ] && break
            sleep 10
          done

          EXIT_CODE=$(az container show --name "$AGENT_CG" --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "containers[0].instanceView.currentState.exitCode" -o tsv)
          az container logs --name "$AGENT_CG" --resource-group "$AZURE_RESOURCE_GROUP" | tee agent.log

          [ "$EXIT_CODE" = "0" ] || { echo "Agent exited with code $EXIT_CODE"; exit 1; }
          grep -q '"recommendation"' agent.log || { echo "Scorecard missing from agent output"; exit 1; }

      - name: Set up uv (lab 08)
        if: startsWith(inputs.lab, '08-')
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python (lab 08)
        if: startsWith(inputs.lab, '08-')
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies (lab 08)
        if: startsWith(inputs.lab, '08-')
        run: uv sync --frozen --all-packages

      - name: Run integration tests against Azure Ollama (lab 08)
        if: startsWith(inputs.lab, '08-')
        env:
          OLLAMA_BASE_URL: http://${{ needs.deploy.outputs.fqdn }}:11434
          OLLAMA_MODEL: llama3.2
        run: |
          echo "Waiting for Ollama API at $OLLAMA_BASE_URL ..."
          for i in $(seq 1 30); do
            curl -sf "$OLLAMA_BASE_URL/api/tags" > /dev/null && break
            sleep 10
          done

          echo "Pulling $OLLAMA_MODEL ..."
          curl -sf "$OLLAMA_BASE_URL/api/pull" -d "{\"name\": \"$OLLAMA_MODEL\"}" | tail -1

          uv run pytest labs/${{ inputs.lab }} -v -m integration

      # Lab 09 seeding moved to the deploy job (per-run Qdrant key stays same-job);
      # the deployed Qdrant is already seeded by the time this smoke test runs.
      - name: Run HTTP smoke test (lab 09)
        if: startsWith(inputs.lab, '09-')
        uses: ./.github/actions/run-smoke-test
        with:
          lab: ${{ inputs.lab }}
          base_url: https://${{ needs.deploy.outputs.fqdn }}

  hold:
    name: Hold for manual validation
    needs: [deploy, publish-functions, smoke-test]
    if: always() && inputs.hold_for_validation == true && needs.deploy.result == 'success' && (needs.publish-functions.result == 'success' || needs.publish-functions.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: integration-teardown
    steps:
      - name: Print endpoint for testing
        run: |
          FQDN="${{ needs.deploy.outputs.fqdn }}"
          COSMOS="${{ needs.deploy.outputs.cosmos_endpoint }}"
          [ -n "$FQDN" ] && echo "Service is live at: https://${FQDN}"
          [ -n "$COSMOS" ] && echo "CosmosDB endpoint: ${COSMOS}"
          echo "Approve this step in GitHub Actions to proceed with teardown."

  teardown:
    name: Terraform destroy
    needs: [build, deploy, publish-functions, smoke-test, hold]
    # Runs on deploy failure and cancellation too: a partial apply still creates resources that must be destroyed
    if: always() && contains(fromJSON('["success", "failure", "cancelled"]'), needs.deploy.result) && (needs.hold.result == 'success' || needs.hold.result == 'skipped' || needs.hold.result == 'cancelled')
    runs-on: ubuntu-latest
    env:
      TF_VAR_container_image: ${{ needs.build.outputs.image_tag }}
      TF_VAR_ghcr_username: ${{ github.repository_owner }}
      TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
      TF_VAR_resource_group_name: ${{ secrets.AZURE_RESOURCE_GROUP }}
      TF_VAR_acr_name: ${{ inputs.acr_name }}
      TF_VAR_mcp_auth_token: ${{ secrets.MCP_AUTH_TOKEN }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      # A run that died before uploading state must not kill teardown; the sweep below still runs
      - name: Download Terraform state
        id: dl
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: tfstate-${{ inputs.lab }}
          path: labs/${{ inputs.lab }}/infra/

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Destroy
        if: steps.dl.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/terraform-destroy
        with:
          working_dir: labs/${{ inputs.lab }}/infra
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Safety net for every path terraform destroy cannot cover (missing or stale
      # state artifact, destroy erroring midway, cancelled deploy): delete anything
      # in the RG still tagged with this lab's number. Shared infra is tagged
      # lab=shared and the CI identity is untagged, so neither can match.
      - name: Azure login (sweep)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sweep remaining lab resources
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          LAB: ${{ inputs.lab }}
        run: |
          LAB_NUM="${LAB%%-*}"
          echo "Sweeping resources tagged lab=${LAB_NUM} in ${AZURE_RESOURCE_GROUP}..."

          # az resource list rejects --tag together with --resource-group, so filter the RG in the query
          # Repeated passes let dependent resources (e.g. a function app on its plan) fall in order
          for pass in 1 2 3 4 5; do
            IDS=$(az resource list --tag "lab=${LAB_NUM}" --query "[?resourceGroup=='${AZURE_RESOURCE_GROUP}'].id" -o tsv)
            if [ -z "$IDS" ]; then
              echo "Sweep clean after $((pass - 1)) pass(es)."
              exit 0
            fi
            echo "Pass ${pass}: deleting $(echo "$IDS" | wc -l) resource(s)"
            echo "$IDS" | tr '\n' '\0' | xargs -0 -r az resource delete --ids || true
            sleep 20
          done

          LEFT=$(az resource list --tag "lab=${LAB_NUM}" --query "[?resourceGroup=='${AZURE_RESOURCE_GROUP}'].id" -o tsv)
          if [ -n "$LEFT" ]; then
            echo "::error::Sweep could not delete the following resources; clean up manually before the next run:"
            echo "$LEFT"
            exit 1
          fi
