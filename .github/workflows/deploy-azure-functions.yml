name: Deploy Azure Functions Lab

on:
  workflow_dispatch:
    inputs:
      lab:
        description: "Azure Functions lab folder"
        required: true
        type: choice
        options:
          - 02-azure-functions-text-classifier

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install workspace dependencies
        run: uv sync --frozen --all-packages

      - name: Assemble deployment package
        run: |
          LAB="labs/${{ inputs.lab }}"
          uv export --package azure-functions-text-classifier --no-hashes --no-dev \
            | grep -v '^-e' > "$LAB/requirements.txt"
          cp -r "$LAB/src/azure_functions_text_classifier" "$LAB/azure_functions_text_classifier"
          cp -r shared/src/production_labs_shared "$LAB/production_labs_shared"

      - name: Deploy function app
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: labs/${{ inputs.lab }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
