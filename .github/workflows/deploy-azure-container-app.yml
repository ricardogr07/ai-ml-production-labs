name: Deploy Azure Container App

on:
  workflow_dispatch:
    inputs:
      lab:
        description: "Lab folder to deploy"
        required: true
        type: choice
        options:
          - 01-fastapi-azure-ml-service
          - 05-ollama-local-llm-api
          - 10-mlflow-classifier-api
          - 13-fastapi-opentelemetry-lab
      image_name:
        description: "Container image name (used as the GHCR image and Container App name)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: .
          dockerfilePath: labs/${{ inputs.lab }}/Dockerfile
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_PAT }}
          imageToBuild: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}
          containerAppName: ${{ inputs.image_name }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
