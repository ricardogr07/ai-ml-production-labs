name: Docker Build

on:
  workflow_dispatch:
    inputs:
      lab:
        description: "Lab directory name (e.g. 01-fastapi-azure-ml-service)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  docker-build:
    name: Build Lab Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -f labs/${{ inputs.lab }}/Dockerfile \
            -t ${{ inputs.lab }}:ci \
            .
