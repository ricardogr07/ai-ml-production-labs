name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build lab Dockerfiles
        run: |
          for dockerfile in labs/*/Dockerfile; do
            lab=$(dirname "$dockerfile" | xargs basename)
            echo "=== Building $lab ==="
            docker build -f "$dockerfile" -t "$lab:ci" .
          done

  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Sync dependencies
        run: uv sync --frozen --all-packages

      - name: Run tox quality gates
        run: uv run tox -e lint,type,py312,security,audit

  anthropic-e2e:
    name: Anthropic E2E (labs 08, 09)
    runs-on: ubuntu-latest
    # Qdrant service for lab 09's e2e: without a reachable, seeded Qdrant the
    # seeded_qdrant fixture skips, so the full retrieve-and-generate loop never
    # runs. That silent skip is how the named-vector bug reached a live run.
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    env:
      QDRANT_URL: http://localhost:6333
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Sync dependencies
        run: uv sync --frozen --all-packages

      - name: Wait for Qdrant and seed the lab 09 corpus
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/readyz > /dev/null && break
            sleep 2
          done
          uv run --frozen --package llamaindex-doc-qa-lab \
            python labs/09-llamaindex-doc-qa-lab/scripts/seed_data.py --recreate

      # Lab 09 needs the seeded Qdrant above; both labs need the key. The lab 09
      # e2e skips only if the key is unavailable (e.g. fork PRs); lab 08 has no
      # Qdrant dependency.
      - name: Run labs 08/09 e2e against the Anthropic API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest labs/08-langgraph-project-agent labs/09-llamaindex-doc-qa-lab -v -m e2e
