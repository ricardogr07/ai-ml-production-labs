services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build:
      context: ../..
      dockerfile: labs/05-ollama-local-llm-api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
